<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Shop</title>
    <style>
        /* CSS Styles */
        :root {
            --primary: #2563eb;
            --dark: #1e293b;
            --light: #f8fafc;
            --gray: #64748b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--light);
            color: var(--dark);
        }

        header {
            background: white;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .cart-icon {
            cursor: pointer;
            position: relative;
            font-weight: bold;
        }

        #cart-count {
            background: var(--primary);
            color: white;
            border-radius: 50%;
            padding: 2px 6px;
            font-size: 12px;
            position: absolute;
            top: -10px;
            right: -15px;
        }

        .container {
            padding: 2rem 5%;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 2rem;
        }

        /* Product Cards */
        .product-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .product-image {
            width: 100%;
            height: 200px;
            background: #eee;
            object-fit: cover;
        }

        .product-info {
            padding: 1.5rem;
        }

        .product-price {
            font-weight: bold;
            color: var(--primary);
            font-size: 1.2rem;
        }

        .add-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 6px;
            margin-top: 1rem;
            cursor: pointer;
            font-weight: 600;
        }

        /* Shopping Cart Sidebar */
        .cart-sidebar {
            position: fixed;
            right: -400px;
            top: 0;
            width: 350px;
            height: 100%;
            background: white;
            box-shadow: -5px 0 15px rgba(0,0,0,0.1);
            transition: 0.3s;
            z-index: 200;
            display: flex;
            flex-direction: column;
        }

        .cart-sidebar.active {
            right: 0;
        }

        .cart-header {
            padding: 1.5rem;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-items {
            flex-grow: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #f1f1f1;
        }

        .cart-footer {
            padding: 1.5rem;
            border-top: 1px solid #eee;
        }

        .close-cart {
            cursor: pointer;
            font-size: 1.5rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>TechStore</h1>
        <div class="cart-icon" onclick="toggleCart()">
            🛒 Cart <span id="cart-count">0</span>
        </div>
    </header>

    <div class="container" id="product-list">
        <!-- Products will be injected here by JS -->
    </div>

    <!-- Cart Sidebar -->
    <div class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header">
            <h2>Your Cart</h2>
            <span class="close-cart" onclick="toggleCart()">&times;</span>
        </div>
        <div class="cart-items" id="cart-items">
            <!-- Cart items injected here -->
        </div>
        <div class="cart-footer">
            <h3>Total: $<span id="cart-total">0.00</span></h3>
            <button class="add-btn" onclick="alert('Checkout not implemented in this demo!')">Checkout</button>
        </div>
    </div>

    <script>
        // 1. Product Data (Mocking a database)
        const products = [
            { id: 1, name: "Wireless Headphones", price: 99.00, img: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=300" },
            { id: 2, name: "Smart Watch", price: 199.00, img: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=300" },
            { id: 3, name: "Bluetooth Speaker", price: 49.00, img: "https://images.unsplash.com/photo-1608156639585-b3a032ef9689?w=300" },
            { id: 4, name: "Gaming Mouse", price: 29.00, img: "https://images.unsplash.com/photo-1527443224154-c4a3942d3acf?w=300" }
        ];

        // 2. Initialize Cart from LocalStorage
        let cart = JSON.parse(localStorage.getItem('cart')) || [];

        // 3. Render Products to Page
        function renderProducts() {
            const productList = document.getElementById('product-list');
            productList.innerHTML = products.map(product => `
                <div class="product-card">
                    <img src="${product.img}" alt="${product.name}" class="product-image">
                    <div class="product-info">
                        <h3>${product.name}</h3>
                        <p class="product-price">$${product.price.toFixed(2)}</p>
                        <button class="add-btn" onclick="addToCart(${product.id})">Add to Cart</button>
                    </div>
                </div>
            `).join('');
        }

        // 4. Add to Cart Logic
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existingItem = cart.find(item => item.id === productId);

            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }

            updateCart();
        }

        // 5. Update Cart UI and LocalStorage
        function updateCart() {
            const cartItemsElement = document.getElementById('cart-items');
            const cartCountElement = document.getElementById('cart-count');
            const cartTotalElement = document.getElementById('cart-total');

            // Update Items List
            cartItemsElement.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <div>
                        <h4>${item.name}</h4>
                        <small>$${item.price} x ${item.quantity}</small>
                    </div>
                    <button onclick="removeFromCart(${item.id})" style="border:none; color:red; cursor:pointer;">Remove</button>
                </div>
            `).join('');

            // Update Totals
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);

            cartTotalElement.innerText = total.toFixed(2);
            cartCountElement.innerText = count;

            // Save to LocalStorage
            localStorage.setItem('cart', JSON.stringify(cart));
        }

        // 6. Remove from Cart
        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            updateCart();
        }

        // 7. Toggle Sidebar
        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('active');
        }

        // Initial Load
        renderProducts();
        updateCart();
    </script>
</body>
</html>
