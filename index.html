<!DOCTYPE html>
<html>
<head>
    <title>Gowtham Shop</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f5f5f5;
        }

        header {
            background: #111;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart {
            background: orange;
            padding: 8px 12px;
            border-radius: 5px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }

        .product {
            background: white;
            width: 220px;
            margin: 15px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        img {
            width: 100%;
            border-radius: 10px;
        }

        button {
            border: none;
            padding: 10px;
            margin-top: 8px;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
        }

        .cart-btn {
            background: #007bff;
            color: white;
        }

        .buy-btn {
            background: green;
            color: white;
        }

        .checkout {
            display: block;
            margin: 20px auto;
            padding: 12px;
            width: 200px;
            background: black;
            color: white;
            text-align: center;
            border-radius: 5px;
            cursor: pointer;
        }

        footer {
            background: #111;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 30px;
        }
    </style>
</head>

<body>

<header>
    <h2>Gowtham Shop</h2>
    <div class="cart">Cart: <span id="cart-count">0</span></div>
</header>

<div class="container">

    <div class="product">
        <img src="https://encrypted-tbn2.gstatic.com/shopping?q=tbn:ANd9GcQGtnyvcteSsIIHrXJWPf_Uf37wlUUWKn9GZi9m70X685T8MyQg54PruoMf2ooCkz3qPQphld8yDry_KYN0kNLAJk84i58ThsCyg6lA6gQs8-K1wod8n4hy1UDzbpBi3p7gyOPjB_5x&usqp=CAc">
        <h3>T-Shirt</h3>
        <p>₹499</p>
        <button class="cart-btn" onclick="addToCart('T-Shirt')">Add to Cart</button>
        <button class="buy-btn" onclick="buyNow('T-Shirt')">Buy Now</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/200">
        <h3>Shoes</h3>
        <p>₹999</p>
        <button class="cart-btn" onclick="addToCart('Shoes')">Add to Cart</button>
        <button class="buy-btn" onclick="buyNow('Shoes')">Buy Now</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/200">
        <h3>Watch</h3>
        <p>₹1499</p>
        <button class="cart-btn" onclick="addToCart('Watch')">Add to Cart</button>
        <button class="buy-btn" onclick="buyNow('Watch')">Buy Now</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/200">
        <h3>Hoodie</h3>
        <p>₹799</p>
        <button class="cart-btn" onclick="addToCart('Hoodie')">Add to Cart</button>
        <button class="buy-btn" onclick="buyNow('Hoodie')">Buy Now</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/200">
        <h3>Earbuds</h3>
        <p>₹1299</p>
        <button class="cart-btn" onclick="addToCart('Earbuds')">Add to Cart</button>
        <button class="buy-btn" onclick="buyNow('Earbuds')">Buy Now</button>
    </div>

</div>

<div class="checkout" onclick="checkout()">Checkout</div>

<footer>
    <h3>Contact Us</h3>
    <p>📞 Phone: 9606872266</p>
    <p>📧 Email: gowthamshop@gmail.com</p>
    <p>📍 Location: Bangalore, India</p>
</footer>

<script>
let cart = [];

function addToCart(product) {
    cart.push(product);
    document.getElementById("cart-count").innerText = cart.length;
}

function buyNow(product) {
    let phone = "919606872266";
    let message = "I want to buy " + product;
    window.open(`https://wa.me/${phone}?text=${message}`);
}

function checkout() {
    if (cart.length === 0) {
        alert("Cart is empty!");
        return;
    }

    let phone = "919606872266";
    let message = "I want to order: " + cart.join(", ");
    window.open(`https://wa.me/${phone}?text=${message}`);
}
</script>

</body>
</html>
