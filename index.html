<!DOCTYPE html>
<html>
<head>
    <title>Gowtham Shop</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f4f4f4;
        }

        header {
            background: #111;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }

        .product {
            background: white;
            width: 220px;
            margin: 15px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        img {
            width: 100%;
            border-radius: 10px;
        }

        button {
            background: green;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
        }
    </style>
</head>

<body>

<header>
    <h1>Gowtham Shop</h1>
</header>

<div class="container">

    <div class="product">
        <img src="https://via.placeholder.com/200">
        <h3>T-Shirt</h3>
        <p>₹499</p>
        <button onclick="buy('T-Shirt')">Buy on WhatsApp</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/200">
        <h3>Shoes</h3>
        <p>₹999</p>
        <button onclick="buy('Shoes')">Buy on WhatsApp</button>
    </div>

</div>

<script>
function buy(product) {
    let phone = "919606872266"; // change this
    let message = "I want to buy " + product;
    window.open(`https://wa.me/${phone}?text=${message}`);
}
</script>

</body>
</html>
